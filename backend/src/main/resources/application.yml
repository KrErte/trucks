spring:
  application:
    name: fuelfleet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fuelfleet}
    username: ${SPRING_DATASOURCE_USERNAME:fuelfleet}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24tMjU2Yml0cw==}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-starter: ${STRIPE_PRICE_STARTER:}
    price-growth: ${STRIPE_PRICE_GROWTH:}
    price-enterprise: ${STRIPE_PRICE_ENTERPRISE:}
  mail:
    from: ${MAIL_FROM:noreply@veokid.ee}
  base-url: ${APP_BASE_URL:https://veokid.ee}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

fuel:
  scheduler:
    enabled: ${FUEL_SCHEDULER_ENABLED:true}
    cron: ${FUEL_SCHEDULER_CRON:0 0 6 * * *}

server:
  port: ${SERVER_PORT:8080}
